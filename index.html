<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="logovelada.png" type="image/png" sizes="any">
  <link rel="shortcut icon" href="logovelada.png" type="image/png">
  <title>La Velada Gorrillas</title>
  <style>
    :root {
      color-scheme: dark;
      color: #ffffff;
      font-family: 'Cinzel', serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: linear-gradient(rgba(0,0,0,0.28), rgba(0,0,0,0.28)), url('fondo.png') center/cover no-repeat fixed;
      color: white;
      text-align: center;
    }

    .page-content {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      gap: 32px;
      padding: 220px 20px 40px;
      flex: 1;
      backdrop-filter: none;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
      }
    }

    .animate-appear {
      opacity: 0;
      animation: fadeUp 1.4s ease forwards;
    }

    .fade-out {
      animation: fadeOut 0.5s ease forwards;
    }

    body.fight-mode .page-content,
    body.fight-mode .footer {
      display: none;
    }

    body.fight-mode .logo {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 130px;
      cursor: pointer;
      z-index: 10;
    }

    .logo {
      max-width: 260px;
      width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
      animation-delay: 0.1s;
    }

    .title {
      font-size: clamp(0.8rem, 1.2vw, 1.4rem);
      margin-top: 0;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      margin: 0;
      color: #ffffff;
      font-family: var(--title-font);
      border: 1px solid rgba(255, 255, 255, 0.9);
      padding: 12px 28px;
      cursor: pointer;
      display: inline-block;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.06);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
      transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
      animation-delay: 0.3s;
    }

    .title:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: translateY(-1px);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18), 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    .footer {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 120px;
      padding: 30px 24px;
    }

    .footer-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #ffffff;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 700;
      padding: 6px 10px;
      animation-delay: 0.5s;
    }

    .footer-link img {
      width: 1em;
      height: 1em;
      display: block;
    }

    .soon-text {
      display: none;
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 2.5rem;
      color: #ffffff;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
      font-weight: bold;
      letter-spacing: 0.1em;
      z-index: 20;
    }

    body.fight-mode .soon-text {
      display: block;
    }

    @media (max-width: 768px) {
      .page-content {
        gap: 20px;
        padding: 120px 15px 30px;
      }

      .logo {
        max-width: 200px;
      }

      body.fight-mode .logo {
        width: 100px;
        top: 15px;
        left: 15px;
      }

      .title {
        font-size: clamp(0.7rem, 1.1vw, 1.2rem);
        padding: 10px 20px;
      }

      .footer {
        gap: 20px;
        padding: 20px 15px;
      }

      .footer-link {
        font-size: 0.9rem;
        padding: 5px 8px;
      }

      .footer-link img {
        width: 0.9em;
        height: 0.9em;
      }

      .soon-text {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <main class="page-content">
    <img src="logovelada.png" alt="Logotipo Velada" class="logo animate-appear">
    <h1 class="title animate-appear">Elige a los luchadores</h1>
  </main>

  <footer class="footer animate-appear">
    <a class="footer-link" href="https://www.instagram.com/gorrillasfc?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" rel="noreferrer noopener">
      <img src="instagramlogo.png" alt="Instagram">
      <span>GORRILLASfc</span>
    </a>
    <a class="footer-link" href="https://www.youtube.com/@GORRILLASyt" target="_blank" rel="noreferrer noopener">
      <img src="ytlogo.png" alt="YouTube">
      <span>LosGorrillas</span>
    </a>
  </footer>

  <div class="soon-text">MUY PRONTO</div>

  <script>
    document.querySelector('.title').addEventListener('click', function() {
      document.querySelector('.page-content').classList.add('fade-out');
      document.querySelector('.footer').classList.add('fade-out');
      setTimeout(() => {
        document.body.classList.add('fight-mode');
      }, 500);
    });

    document.querySelector('.logo').addEventListener('click', function() {
      window.location.reload();
    });
  </script>
</body>
</html>
